name: Publish to PyPI

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build toolchain
        run: python -m pip install --upgrade pip build

      - name: Build distributions
        run: python -m build

      - name: Smoke test built wheel
        shell: bash
        run: |
          python -m pip install --force-reinstall dist/*.whl
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          python - <<'PY'
          from pyhulax import DroneAPI
          from pyhulax.config import DroneConfig
          from pyhulax.core import Direction
          from pyhulax.logging import SQLiteLogger
          from pyhulax.video import Frame

          api = DroneAPI(enable_command_logging=False)
          assert api.default_ip == "192.168.100.1"
          assert Direction.FORWARD.name == "FORWARD"
          assert DroneConfig.__name__ == "DroneConfig"
          assert SQLiteLogger.__name__ == "SQLiteLogger"
          assert Frame.__name__ == "Frame"
          print("wheel smoke ok")
          PY

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  publish-pypi:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
