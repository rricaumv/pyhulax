site_name: pyhulax SDK
site_description: Typed Python SDK documentation for the Hula drone API
theme:
  name: material
  palette:
    - scheme: rosepine-moon
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to Rosé Pine Dawn
    - scheme: rosepine-dawn
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to Rosé Pine Moon
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.select
    - content.code.annotate

docs_dir: docs
extra_css:
  - stylesheets/rosepine.css
  - stylesheets/reference.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .
          options:
            docstring_style: google
            show_root_heading: true
            show_root_full_path: false
            show_source: false
            heading_level: 2
            inherited_members: false
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            annotations_path: brief
            modernize_annotations: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            extensions:
              - pydantic:
                  schema: true
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - SDK:
      - Installation: sdk/installation.md
      - Overview: sdk/README.md
      - Configuration: sdk/configuration.md
      - DroneAPI Guide: sdk/pyhulax.md
      - Types, Models, and Errors: sdk/types_models_errors.md
      - Video and Logging: sdk/video_logging.md
  - API Reference:
      - pyhulax Module: reference/pyhulax.md
      - Config Models: reference/config.md
      - Core Types: reference/core_types.md
      - Core Models: reference/core_models.md
      - Exceptions: reference/exceptions.md
      - Controller Types: reference/control.md
      - Fylo Internals: reference/fylo.md
      - Logging: reference/logging.md
      - System Internals: reference/system.md
      - Video API: reference/video.md
      - Video Types: reference/video_types.md
